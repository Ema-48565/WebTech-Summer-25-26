<!DOCTYPE html>
<html>

<head>
    <title>Student Registration</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>

</head>

<body>

    <div class="container">

        <fieldset>

            <legend>Student Registration Form</legend>

            <form onsubmit="return collectData();">

                <table class="formTable">

                    <tr>
                        <td>
                            <label>First Name <span>*</span></label>
                        </td>

                        <td>
                            <input type="text" id="firstName" placeholder="Enter Your First Name">
                        </td>

                        <td>
                            <span id="firstNameError" class="error"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Last Name <span>*</span></label>
                        </td>

                        <td>
                            <input type="text" id="lastName" placeholder="Enter Your Last Name">
                        </td>

                        <td>
                            <span id="lastNameError" class="error"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Student ID <span>*</span></label>
                        </td>

                        <td>
                            <input type="text" id="studentId" placeholder="22-48565-3">
                        </td>

                        <td>
                            <span id="studentIdError" class="error"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Email <span>*</span></label>
                        </td>

                        <td>
                            <input type="text" id="email" placeholder="example@student.aiub.edu">
                        </td>

                        <td>
                            <span id="emailError" class="error"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Credit Completed <span>*</span></label>
                        </td>

                        <td>
                            <input type="number" id="credit" placeholder="Enter Credit">
                        </td>

                        <td>
                            <span id="creditError" class="error"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Department <span>*</span></label>
                        </td>

                        <td>

                            <select id="department">

                                <option value="">Select Department</option>
                                <option value="CSE">CSE</option>
                                <option value="EEE">EEE</option>
                                <option value="BBA">BBA</option>

                            </select>

                        </td>

                        <td>
                            <span id="departmentError" class="error"></span>
                        </td>

                    </tr>

                    <tr>

                        <td colspan="3" align="center">

                            <input type="submit" value="Submit">

                        </td>

                    </tr>

                </table>

            </form>

        </fieldset>

        <br><br>

        <h2>Registered Student List</h2>

        <table id="studentTable">

            <tr>

                <th>First Name</th>
                <th>Last Name</th>
                <th>Student ID</th>
                <th>Email</th>
                <th>Credit</th>
                <th>Department</th>

            </tr>

        </table>

    </div>

</body>

</html>
